name: ci

"on":
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt -e .

      - name: Ruff check
        run: ruff check ai_adoption_diff/ tests/

      - name: Ruff format check
        run: ruff format --check ai_adoption_diff/ tests/

      - name: Pytest
        run: pytest -q
        env:
          AI_DIFF_LOG_LEVEL: WARNING
